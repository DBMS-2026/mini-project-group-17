version: '3.9'

services:

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexusestate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-nexusestate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./nexusestate.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Node.js Backend (Express + Socket.io)
  # PORT: 3001
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusestate_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-nexusestate}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      SWAP_ENGINE_URL: http://swap-engine:8001
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Python Swap Engine (FastAPI — Graph Algorithm)
  # PORT: 8001
  # ──────────────────────────────────────────────
  swap-engine:
    build:
      context: ./swap-engine
      dockerfile: Dockerfile
    container_name: nexusestate_swap_engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  # ──────────────────────────────────────────────
  # Python AI Service (FastAPI — ML Models)
  # PORT: 8000
  # ──────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nexusestate_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./ai-service/models:/app/models  # persist trained model files

  # ──────────────────────────────────────────────
  # Next.js Frontend
  # PORT: 3000
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusestate_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
